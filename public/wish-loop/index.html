<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ønske-loop · KidsAID × Ønskeskyen</title>
  <link rel="stylesheet" href="design-system.css" />
  <style>
    /* ─── Stage ─────────────────────────────────────────────────────────── */
    html, body { margin: 0; padding: 0; background: #06100a; height: 100%; }
    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--cream);
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #06100a;
      isolation: isolate;
      user-select: none;
    }

    /* ─── Background layers ─────────────────────────────────────────────── */
    .bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }
    .bg-video {
      position: absolute;
      inset: -8%;
      width: 116%;
      height: 116%;
      object-fit: cover;
      transform: scale(1.08);
      transition: filter 600ms ease;
    }
    .bg-gradient {
      position: absolute;
      inset: -15%;
      transition: filter 600ms ease;
    }
    .bg-gradient .g {
      position: absolute;
      border-radius: 50%;
      filter: saturate(1.1);
      animation: drift 22s ease-in-out infinite alternate;
      will-change: transform, opacity;
    }
    .bg-gradient .g1 {
      width: 70%; height: 70%;
      left: -10%; top: -10%;
      background: radial-gradient(closest-side, #3FA34D 0%, transparent 70%);
      animation-duration: 26s;
    }
    .bg-gradient .g2 {
      width: 60%; height: 60%;
      right: -10%; top: 10%;
      background: radial-gradient(closest-side, #B8893A 0%, transparent 70%);
      animation-duration: 32s; animation-delay: -8s;
    }
    .bg-gradient .g3 {
      width: 80%; height: 80%;
      left: 10%; bottom: -20%;
      background: radial-gradient(closest-side, #1F4A28 0%, transparent 70%);
      animation-duration: 28s; animation-delay: -4s;
    }
    .bg-gradient .g4 {
      width: 40%; height: 40%;
      left: 30%; top: 30%;
      background: radial-gradient(closest-side, #D9B26A 0%, transparent 70%);
      animation-duration: 18s; animation-delay: -10s;
    }
    .bg-gradient .g5 {
      width: 50%; height: 50%;
      right: 15%; bottom: 10%;
      background: radial-gradient(closest-side, #4FB85D 0%, transparent 70%);
      animation-duration: 24s; animation-delay: -14s;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(6%, -4%) scale(1.1); }
      66%  { transform: translate(-5%, 5%) scale(0.95); }
      100% { transform: translate(3%, 2%) scale(1.05); }
    }

    .bg-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.92 0 0 0 0 0.85 0 0 0 0.85 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
    }
    .bg-scrim {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .bg-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 50%, transparent 50%, rgba(0,0,0,0.45) 100%);
    }

    /* ─── Cards layer ───────────────────────────────────────────────────── */
    .cards {
      position: absolute;
      top: 6cqh;
      left: 0;
      right: 0;
      bottom: 12cqh;
      z-index: 1;
      perspective: 2400px;
      perspective-origin: 50% 45%;
    }
    .card {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 900ms cubic-bezier(.22,.61,.36,1),
        opacity 700ms cubic-bezier(.22,.61,.36,1),
        filter 700ms ease;
      will-change: transform, opacity;
      transform-origin: 50% 60%;
    }
    .apple-frame {
      width: auto;
      height: 100%;
      aspect-ratio: 1536 / 1843;
      max-width: 60cqw;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .apple-img, .apple-svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter:
        drop-shadow(0 40px 60px rgba(0,0,0,0.45))
        drop-shadow(0 12px 24px rgba(0,0,0,0.25));
      pointer-events: none;
      -webkit-user-drag: none;
    }
    .stage { container-type: size; }

    /* ─── Direction: STACK ──────────────────────────────────────────────── */
    /* Apples piled like cards; the top one peels off, the rest slide up to fill. */
    .stage--stack .card {
      --tx: 0%;
      --ty: 0%;
      --rot: 0deg;
      --scale: 1;
      --opacity: 1;
      --filter: brightness(1) saturate(1);
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(var(--scale));
      opacity: var(--opacity);
      filter: var(--filter);
      z-index: calc(100 - var(--off));
    }
    /* Front card centered; back cards peek out around it (alternating sides) */
    .stage--stack .card[data-offset="0"]  { --rot: -1.5deg; --tx:  0%;    --ty:  0%;   --scale: 1.00; }
    .stage--stack .card[data-offset="1"]  { --rot:  4deg;   --tx: -2.4%;  --ty: -2.4%; --scale: 0.96;  --filter: brightness(0.70) saturate(0.9) blur(0.8px); --opacity: 1; }
    .stage--stack .card[data-offset="2"]  { --rot: -3deg;   --tx:  2.6%;  --ty: -4.6%; --scale: 0.92;  --filter: brightness(0.55) saturate(0.85) blur(1.6px); --opacity: 0.95; }
    .stage--stack .card[data-offset="3"]  { --rot:  2.5deg; --tx: -1.6%;  --ty: -6.4%; --scale: 0.88;  --filter: brightness(0.45) saturate(0.8)  blur(2.4px); --opacity: 0.85; }
    .stage--stack .card[data-offset="4"]  { --rot: -2deg;   --tx:  1.0%;  --ty: -8.0%; --scale: 0.85;  --filter: brightness(0.36) saturate(0.75) blur(3.2px); --opacity: 0.7; }
    .stage--stack .card[data-offset="5"]  { --rot:  1.5deg; --tx: -0.3%;  --ty: -9.4%; --scale: 0.82;  --filter: brightness(0.28) saturate(0.7)  blur(4px);   --opacity: 0.55; }
    .stage--stack .card[data-offset="6"]  { --rot: -1deg;   --tx:  0%;    --ty:-10.6%; --scale: 0.80;  --filter: brightness(0.22) saturate(0.65) blur(5px);   --opacity: 0.40; }

    /* Exit: peel off to the left + spin slightly down */
    .stage--stack .card[data-offset="-1"] {
      --tx: -90%;
      --ty: 16%;
      --rot: -26deg;
      --scale: 0.94;
      --opacity: 0;
      --filter: brightness(0.7) saturate(0.9);
      z-index: 1;
      transition-duration: 1100ms;
    }

    /* ─── Direction: CINEMA ─────────────────────────────────────────────── */
    /* Cross-fade with a gentle ken-burns push; only the active card is visible. */
    .stage--cinema .card {
      opacity: 0;
      transform: scale(1.04);
      filter: blur(2px);
      z-index: 1;
      transition:
        transform var(--per-card, 5s) linear,
        opacity 1100ms cubic-bezier(.4,0,.2,1),
        filter 900ms ease;
    }
    .stage--cinema .card[data-offset="0"] {
      opacity: 1;
      transform: scale(1.12);
      filter: blur(0);
      z-index: 10;
    }
    .stage--cinema .card[data-offset="-1"] {
      opacity: 0;
      transform: scale(1.18);
      filter: blur(4px);
      z-index: 5;
      transition:
        transform 1400ms ease-out,
        opacity 1100ms cubic-bezier(.4,0,.2,1),
        filter 900ms ease;
    }
    .stage--cinema .apple-frame { width: min(70%, 70vh); }
    .stage--cinema .apple-img, .stage--cinema .apple-svg {
      filter:
        drop-shadow(0 60px 80px rgba(0,0,0,0.55))
        drop-shadow(0 20px 40px rgba(0,0,0,0.35));
    }

    /* ─── Direction: DRIFT ──────────────────────────────────────────────── */
    /* Apples drift in from the right, glide past, drift out left. */
    .stage--drift .card {
      opacity: 0;
      transform: translateX(80%) rotate(6deg) scale(0.92);
      filter: blur(6px);
      z-index: 1;
      transition:
        transform 1100ms cubic-bezier(.22,.61,.36,1),
        opacity 900ms ease,
        filter 700ms ease;
    }
    .stage--drift .card[data-offset="0"] {
      opacity: 1;
      transform: translateX(0) rotate(-2deg) scale(1);
      filter: blur(0);
      z-index: 10;
    }
    .stage--drift .card[data-offset="1"] {
      opacity: 0.45;
      transform: translateX(38%) rotate(4deg) scale(0.85);
      filter: blur(3px);
      z-index: 5;
    }
    .stage--drift .card[data-offset="-1"] {
      opacity: 0;
      transform: translateX(-78%) rotate(-10deg) scale(0.88);
      filter: blur(4px);
      z-index: 2;
    }

    /* ─── Chrome ────────────────────────────────────────────────────────── */
    .chrome {
      position: absolute;
      z-index: 50;
      color: var(--cream);
    }
    .chrome--top-left {
      top: 3.2cqh;
      left: 2.4cqw;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .kidsaid-mark {
      width: 5.4cqh;
      height: 5.4cqh;
      min-width: 44px;
      min-height: 44px;
      border-radius: 12px;
      background: var(--cream);
      display: grid;
      place-items: center;
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    }
    .kidsaid-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .eyebrow-block { display: flex; flex-direction: column; gap: 4px; }
    .eyebrow-pretitle {
      font-family: var(--font-mono);
      font-size: clamp(9px, 1cqh, 12px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold-light);
      opacity: 0.9;
    }
    .eyebrow-title {
      font-family: var(--font-display);
      font-size: clamp(16px, 2.4cqh, 26px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.005em;
      color: var(--cream);
    }

    .chrome--top-right {
      top: 3.2cqh;
      right: 2.4cqw;
      text-align: right;
    }
    .sponsor {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }
    .sponsor-pre {
      font-family: var(--font-mono);
      font-size: clamp(9px, 1cqh, 12px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.6;
    }
    .sponsor-name {
      font-family: var(--font-display);
      font-size: clamp(18px, 2.6cqh, 30px);
      font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--gold-light);
      text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }
    .sponsor-logo {
      max-height: clamp(28px, 5cqh, 64px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
    }

    .chrome--bottom {
      bottom: 4cqh;
      left: 2.4cqw;
      right: 2.4cqw;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: clamp(16px, 3cqw, 40px);
      padding-top: 14px;
    }
    .counter {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--cream);
    }
    .counter-num {
      font-size: clamp(22px, 3.6cqh, 44px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--gold-light);
      line-height: 0.9;
    }
    .counter-sep {
      font-size: clamp(18px, 2.6cqh, 30px);
      font-weight: 400;
      color: var(--cream);
      opacity: 0.5;
      padding: 0 2px;
    }
    .counter-total {
      font-size: clamp(15px, 2cqh, 22px);
      font-weight: 500;
      color: var(--cream);
      opacity: 0.7;
    }
    .progress {
      width: 100%;
    }
    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(244, 236, 216, 0.18);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand-glow), var(--gold-light));
      box-shadow: 0 0 12px rgba(217, 178, 106, 0.6);
      transition: width 800ms cubic-bezier(.22,.61,.36,1);
      border-radius: 2px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: clamp(9px, 1cqh, 12px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--cream);
      opacity: 0.75;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-glow);
      box-shadow: 0 0 10px var(--brand-glow);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .status.is-paused .status-dot {
      background: var(--gold-light);
      box-shadow: 0 0 10px var(--gold-light);
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* ─── Reduced motion ────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .bg-gradient .g { animation: none; }
      .card { transition-duration: 300ms !important; }
    }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Parse cfg from location hash so the host can embed via iframe src -->
  <script>
    (function() {
      try {
        var hash = location.hash || '';
        var m = hash.match(/cfg=([^&]+)/);
        if (m) {
          var cfg = JSON.parse(decodeURIComponent(m[1]));
          window.__WISH_LOOP_CONFIG__ = cfg;
        }
      } catch (e) { console.warn('wish-loop: bad cfg in hash', e); }
    })();
  </script>

  <!-- Module script (host config via window.__WISH_LOOP_CONFIG__ + postMessage) -->
  <script type="text/babel" src="wish-loop.jsx"></script>
</body>
</html>
