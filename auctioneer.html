<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auktionarius — StjerneGolf 2026</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <link rel="stylesheet" href="/src/slides.css" />
  <link rel="stylesheet" href="/src/chrome.css" />
</head>
<body class="auctioneer-f">
  <main id="stage">
    <div class="auct-monitor" id="auct-monitor">
      <div class="auct-monitor-vignette"></div>
      <div class="auct-monitor-clock" id="auct-clock">00:00:00</div>
      <div class="auct-monitor-header">
        <div class="auct-monitor-lotnum" id="auct-lotnum">—</div>
        <div class="auct-monitor-title">
          <span id="auct-title-text">—</span>
          <span class="auct-monitor-donor" id="auct-donor"></span>
        </div>
      </div>
      <img class="auct-monitor-artsolo" src="/assets/artsolo-logo.png" alt="artsolo" />
      <div class="auct-monitor-bid-wrap">
        <div class="auct-monitor-bid-label">Nuværende bud</div>
        <div class="auct-monitor-bid" id="auct-bid">—<span class="kr">kr</span></div>
      </div>
      <div class="sound-countdown-f" id="sound-countdown">
        <span class="label">Lyd afspilles</span>
        <span class="file" id="sound-file"></span>
        <div class="bar"><div class="bar-fill" id="sound-bar-fill"></div></div>
        <span class="remaining" id="sound-remaining">0.0s</span>
      </div>
    </div>
  </main>
  <script type="module" src="/src/auctioneer.ts"></script>
</body>
</html>
